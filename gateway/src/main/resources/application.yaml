server:
  port: 9000

spring:
  application:
    name: gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods: "GET,POST,PUT,DELETE,OPTIONS"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: backend
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**
        - id: portfolio-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/portfolio/**
        - id: market-data
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/market/**
        - id: profile-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/profile/**
